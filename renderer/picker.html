<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>Pick Location</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        background: #0f1120;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
        user-select: none;
      }

      .titlebar {
        height: 28px;
        background: #1e2035;
        display: flex;
        align-items: center;
        padding: 0 12px;
        cursor: move;
        -webkit-app-region: drag;
        border-bottom: 1px solid rgba(99,102,241,0.3);
        gap: 6px;
      }
      .titlebar .dot { width: 8px; height: 8px; border-radius: 50%; background: #818cf8; }
      .titlebar span { font-size: 11px; color: #818cf8; font-weight: 600; letter-spacing: 0.5px; }

      .body {
        padding: 14px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .hint {
        font-size: 11px;
        color: #64748b;
        line-height: 1.4;
      }
      .hint strong { color: #94a3b8; }

      .coords-box {
        background: #1e2035;
        border: 1px solid rgba(99,102,241,0.4);
        border-radius: 8px;
        padding: 10px 14px;
        text-align: center;
      }
      .coords-value {
        font-family: 'Consolas', 'Fira Code', monospace;
        font-size: 20px;
        color: #38bdf8;
        letter-spacing: 1px;
      }
      .coords-label {
        font-size: 10px;
        color: #475569;
        margin-top: 2px;
      }

      .btn-row {
        display: flex;
        gap: 8px;
      }

      .btn-confirm {
        flex: 1;
        background: #4f46e5;
        color: #fff;
        border: none;
        padding: 9px 12px;
        border-radius: 7px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        -webkit-app-region: no-drag;
        transition: background 0.15s;
      }
      .btn-confirm:hover { background: #4338ca; }
      .btn-confirm:active { background: #3730a3; }

      .btn-cancel {
        background: #1e2035;
        color: #94a3b8;
        border: 1px solid rgba(99,102,241,0.25);
        padding: 9px 14px;
        border-radius: 7px;
        font-size: 13px;
        cursor: pointer;
        -webkit-app-region: no-drag;
        transition: background 0.15s;
      }
      .btn-cancel:hover { background: #2d3148; }

      .shortcut-hint {
        font-size: 10px;
        color: #334155;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <div class="dot"></div>
      <span>PICK LOCATION</span>
    </div>
    <div class="body">
      <p class="hint">Mova o cursor até a posição desejada na tela e clique em <strong>Confirmar</strong>.</p>
      <div class="coords-box">
        <div class="coords-value" id="coords">X: — &nbsp;&nbsp; Y: —</div>
        <div class="coords-label">posição atual do cursor</div>
      </div>
      <div class="btn-row">
        <button class="btn-confirm" id="btn-confirm">✓ Confirmar posição</button>
        <button class="btn-cancel" id="btn-cancel">✕ Cancelar</button>
      </div>
      <div class="shortcut-hint">ESC para cancelar · ENTER para confirmar</div>
    </div>
    <script src="picker.js"></script>
  </body>
</html>
